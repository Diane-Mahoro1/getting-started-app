#     steps:
#       - name: 
name: Build and Push to Docker Hub

# 1. Trigger the workflow on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the GitHub runner machine
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Log into Docker Hub securely using your secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker's build tool system (Buildx)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build your Dockerfile and push it to Docker Hub
      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Replace 'mahorodiane011' with your actual Docker Hub username if it is different
          tags: |
            mahorodiane011/todo-app:latest
            mahorodiane011/todo-app:${{ github.sha }}
